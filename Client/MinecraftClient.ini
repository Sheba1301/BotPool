# Файл конфигурации запуска
# Пожалуйста, не записывайте посторонние данные в этот файл, так как он будет перезаписан MCC.
# 
# Новый клиент консоли Minecraft? Посмотрите этот документ: https://mccteam. ithub.io/g/conf.html
# Хотите перейти на новую версию? Смотрите https://github.com/MCCTeam/Minecraft-Console-Client/#download
[Head]
"Current Version" = "GitHub build 459, built on 2026-06-07 from commit 61c2cbf"
"Latest Version" = "GitHub build 471, built on 2026-06-17"

[Main]
[Main.General]
Account = { Login = "tuwu320", Password = "-" } # Логин=Email или Никнейм. Используйте "-" в качестве пароля для оффлайн-режима. Оставьте пустым, чтобы спрашивать пользователя при запуске.
Server = { Host = "mc.reallyworld.ru" }     # Адрес игрового сервера, "Host" может быть заполнен именем домена или IP-адресом. (Поле "Port" может быть удалено, это будет решено автоматически)
AccountType = "mojang"                      # Тип аккаунта: "mojang" ИЛИ "microsoft" ИЛИ "yggdrasil". Также влияет на интерактивный вход в консоль.
Method = "mcc"                              # Способ входа в учётную запись Microsoft: «mcc» (код устройства, поддерживает двухфакторную аутентификацию) или «browser» (ручной вход через браузер).
AuthUser = ""                               # Выбор многопользовательского режима аутентификации Yggdrasil.
[Main.General.AuthServer]                   # Сервер аутентификации authlib-injector, используемый для учётных записей Yggdrasil
Port = 443                                  # Порт для подключения
AuthlibInjectorAPIPath = "/api/yggdrasil"   # Компонент пути к API authlib-injector. Для получения более подробной информации обратитесь к документации authlib-injector.
UseHttps = true                             # Установите в false, если ваш сервер с Authlib Injector использует обычный HTTP (например, для локального тестирования без TLS).
Host = ""                                   # Доменное имя или IP-адрес


# Удостоверьтесь, что вы понимаете каждую настройку, перед тем как что-то менять!
[Main.Advanced]
EnableSentry = true                         # Установите значение false, чтобы отключить отправку ошибок в Sentry.
Language = "ru_ru"                          # Заполните внутри игровым локальным кодом, проверьте https://mccteam.github.io/r/l-code.html
LoadMccTranslation = true                   # Загрузить переводы, применяемые к MCC когда доступно, выключите их для использования только на английском языке.
LoadResourcePackTranslations = true         # Load translations from server resource packs and cache extracted language entries locally for faster reuse.
LoadForgeModTranslations = false            # Load translations from local Forge mod jars when their mod IDs are announced by the server. Disabled by default.
AutoDiscoverForgeModTranslationSources = true # Also scan standard Minecraft, Prism Launcher, and CurseForge instance mod folders for translation jars when available.
ForgeModTranslationPath = ""                # Optional path to a mods folder. When set, MCC loads Forge mod translations from this folder instead of automatic discovery.
ConsoleTitle = "%username%@%serverip% - Minecraft Console Client"
InternalCmdChar = "slash"                   # Используйте "none", "slash"(/) или "backslash"(\).
MessageCooldown = 1.0                       # Контролирует минимальный интервал (в секундах) между отправкой каждого сообщения на сервер.
MaxChatMessageLength = 0                    # Переопределяет максимальную длину сообщения в чате. Установите 0, чтобы использовать значение по умолчанию (100 для версий до 1.10 включительно, 256 — для 1.11 и выше). ВНИМАНИЕ: Неправильная настройка может привести к исключению вас с сервера.
BotOwners = [ "player1", "player2", ]       # Установите владельца бота. /!\ Администраторы сервера могут выдавать себя за владельцев!
MinecraftVersion = "auto"                   # Используйте "auto" или "1.X.X". Позволяет пропустить получение информации о сервере.
EnableForge = "no"                          # Используйте "auto", "no" или "force". Принудительный режим (force) работает только для Майнкрафта 1.13+.
BrandInfo = "mcc"                           # Используйте "mcc", "vanilla" или "none". Так MCC показывает имя клиента для сервера.
ChatbotLogFile = ""                         # Оставьте пустым, если нет логфайла.
PrivateMsgsCmdName = "tell"                 # Для дистанционного управления ботом.
ShowSystemMessages = true                   # Системные сообщения для операторов.
ShowXPBarMessages = true                    # Сообщения, отображаемые над шкалой опыта, установите значение false в случае спама шкалой опыта.
ShowChatLinks = true                        # Декодировать ссылки в сообщениях чата и показывать их в консоли.
ShowInventoryLayout = true                  # Показывать макет инвентаря ASCII символами в команде inventory
ShowEffectMessages = true                   # Show chat notifications when your active effects are gained or expire. Set to false to disable these messages entirely.
ShowEffectNamesInTUI = false                # В строке состояния TUI отображать полные названия и уровни эффектов, а не только компактные иконки эффектов.
ShowGithubStarReminder = true               # Показывать напоминание о постановке звёздочки на GitHub при запуске. Установите в false, чтобы скрыть его.
TerrainAndMovements = true                  # Использует больше ОЗУ, ЦП, но позволяет перемещаться.
MoveHeadWhileWalking = true                 # Включить движение головы во время ходьбы, чтобы избежать срабатывания античитов
MovementSpeed = 2                           # Скорость движения выше 2 может считаться читерством
TemporaryFixBadpacket = false               # Временное исправление проблемы Badpacket на некоторых серверах. Сначала нужно включить "TerrainAndMovements".
InventoryHandling = true                    # Переключить обработку инвентаря.
EntityHandling = true                       # Обработка сущностей.
SessionCache = "disk"                       # Как сохранять токены сессий. Используйте "none", "memory" или "disk".
ProfileKeyCache = "disk"                    # Как хранить ключ профиля. Используйте "none", "memory" или "disk".
ResolveSrvRecords = "fast"                  # Используйте "no", "fast" (задержка в 5сек.), или "yes". Требуется для присоединения к некоторым серверам.
PlayerHeadAsIcon = true                     # Работает только на Windows XP-8 или Windows 10 со старой консолью.
ExitOnFailure = false                       # Выйти непосредственно при возникновении ошибки, при использовании MCC в неинтерактивных скриптах.
CacheScript = true                          # Кэшировать скрипты для ускорения загрузки на слабых устройствах.
Timestamps = false                          # Добавлять временны́е метки к сообщениям в чате.
AutoRespawn = false                         # Включить автореспавн, если клиент игрока умер (убедитесь, что ваша точка респавна безопасна).
MinecraftRealms = false                     # Включить поддержку присоединения к мирам Minecraft Realms
TcpTimeout = 30                             # Настройка таймаута TCP соединения с сервером. (в секундах)
EnableEmoji = true                          # Если функция выключена, то эмодзи будет заменено более простым символом
MinTerminalWidth = 16                       # Минимальная ширина, используемая при вычислении размера изображения из ширины терминала.
MinTerminalHeight = 10                      # Минимальная высота, используемая при вычислении размера изображения из высоты терминала.
IgnoreInvalidPlayerName = true              # Игнорировать недопустимое имя игрока
# AccountList: помогает быстро переключать учётные записи без использования учётных данных. Примеры использования: "/tell <mybot> reco Player2", "/connect <serverip> Player1"
[Main.Advanced.AccountList]
AccountNikename1 = { Login = "playerone@email.com", Password = "thepassword" }
AccountNikename2 = { Login = "TestBot", Password = "-" }

# ServerList: Позволяет легче и быстрее переключаться между серверами при помощи коротких псевдонимов вместо полного IP-адреса.
# Псевдонимы не могут содержать точки или пробелы, и имя "localhost" не может быть использовано как псевдоним.
# Примеры использования: "/tell <mybot> connect Server1", "/connect Server2"
[Main.Advanced.ServerList]
ServerAlias1 = { Host = "mc.awesomeserver.com" }
ServerAlias2 = { Host = "192.168.1.27", Port = 12345 }



# Настройки, связанные с подписью в чате (влияет на Minecraft 1.19+)
[Signature]
LoginWithSecureProfile = true               # Только учетные записи Microsoft. Если эта функция отключена, вы не сможете входить в чат и подключаться к серверам, настроенным с параметром "enforce-secure-profile=true".
SignChat = true                             # Подписывать ли чат, отправленный из MCC
SignMessageInCommand = true                 # Указывает, следует ли подписывать сообщения, содержащиеся в командах, отправляемых MCC. Например, сообщения в командах /msg и /me.
MarkLegallySignedMsg = true                 # Используйте зеленый    цветной блок, что бы пометить чат с подлинной подписи
MarkModifiedMsg = true                      # Используйте желтый цветной блок, что бы пометить чат, который был изменён сервером
MarkIllegallySignedMsg = true               # Используйте красный    цветной блок, что бы пометить чат без подлинной подписи
MarkSystemMessage = true                    # Используйте серый   цветной блок, что бы пометить системное сообщение (всегда без сигнатуры)
ShowModifiedChat = true                     # Установите "true", чтобы показывать измененные сервером сообщения, или "false", чтобы показывались оригинальные сообщения
ShowIllegalSignedChat = true                # Отображать ли чат и сообщения с командами без законных подписей?

# Этот параметр затрагивает только сообщения в консоли.
[Logging]
DebugMessages = false                       # Пожалуйста, включите это перед отправкой сообщений об ошибках. Спасибо!
ChatMessages = true                         # Показывать сообщения чата сервера.
InfoMessages = true                         # Информационные сообщения. (Например, большинство сообщений от MCC)
WarningMessages = true                      # Показывать предупреждения.
ErrorMessages = true                        # Показывать ошибки.
ChatFilterRegex = ".*"                      # Regex для фильтрации сообщений чата.
DebugFilterRegex = ".*"                     # Слово-фильтр для отладочного сообщений
FilterMode = "disable"                      # «выключить» или «черный список» ИЛИ «белый список». Черный список скрывает регулярное выражение по соответствию. Белый список отображает регулярное выражение в сообщении.
LogToFile = false                           # Логировать сообщения в файл.
LogFile = "console-log.txt"                 # Название файла логов.
PrependTimestamp = false                    # Добавить временную метку к сообщениям для лог-файла
SaveColorCodes = false                      # Сохранить кода цветов в сохранённом тексте. (выглядит как "§b")

[Console]
[Console.General]
ConsoleMode = "classic"                     # Режим консоли: «classic» — стандартная терминальная консоль, «tui» — псевдографический полноэкранный интерфейс.
ConsoleColorMode = "vt100_24bit"            # Используйте "disable", "legacy_4bit", "vt100_4bit", "vt100_8bit" или "vt100_24bit". Если в терминале появляется испорченный код по типу "←[0m", вы можете попробовать переключиться на режим "legacy_4bit", или просто отключить это.
Display_Icon_Banner = true                  # Указывает, отображать ли баннер с логотипом MCC при запуске.
Display_Input = true                        # Вы можете использовать "Ctrl+P" для вывода текущего ввода и позиции курсора
Display_Chat = true                         # Whether to display received chat messages in the console. This does not affect chat bots or chat log files.
History_Input_Records = 32                  # Максимальное количество записей в истории ввода, которое следует сохранять.
TUI_Log_Scrollback = 0                      # Максимальное количество строк журнала, сохраняемых в буфере прокрутки режима TUI. Установите 0 для автоматического значения.

# Настройки для предложений завершения команд.
# Пользовательские цвета доступны только при использовании цветового режима "vt100_24bit".
[Console.CommandSuggestion]
Enable = true                               # Показывать ли предложения команд в консоли.
Enable_Color = true
Use_Basic_Arrow = false                     # Включите эту опцию, если в терминале неправильно отображаются стрелки в подсказках команд.
Max_Suggestion_Width = 30
Max_Displayed_Suggestions = 10
Text_Color = "#f8fafc"
Text_Background_Color = "#64748b"
Highlight_Text_Color = "#334155"
Highlight_Text_Background_Color = "#fde047"
Tooltip_Color = "#7dd3fc"
Highlight_Tooltip_Color = "#3b82f6"
Arrow_Symbol_Color = "#d1d5db"

# Настройки мини-карты TUI, отображающей рельеф и объекты.
[Console.Minimap]
Enabled = false                             # Является ли мини-карта видимой при запуске в режиме TUI.
Zoom = 2                                    # Количество блоков на пиксель, 1–16. 1 = ближе всего (1:1), 16 = дальше всего (16 блоков на пиксель).
Width = 40                                  # Ширина карты в пикселях (символах). Диапазон 10–120, по умолчанию 40.
Height = 40                                 # Высота карты в пикселях (должна быть чётной, использует символы полублоков). Диапазон 4–80, по умолчанию 40.
Position = "top_right"                      # Позиция мини-карты: «верхний_левый», «верхний_правый», «центр», «нижний_левый» или «нижний_правый».
ShowPlayerNames = false                     # Показывать имена игроков на мини-карте.
ShowHostileNames = false                    # Показывать агрессивных мобов на мини-карте.
ShowNeutralNames = false                    # Показывать имена нейтральных мобов на мини-карте.
ShowPassiveNames = false                    # Показывать названия пассивных мобов на мини-карте.
RefreshInterval = 1000                      # Интервал обновления мини-карты в миллисекундах (100–5000).
CaveMode = "auto"                           # Режим отрисовки пещер: «auto» (автоматическое определение потолка), «on» (всегда вид пещеры), «off» (всегда вид поверхности).

# Настройки команды /tab и живого вкладочного оверлея TUI.
[Console.TabList]
ShowTeams = false                           # Показывать отдельную колонку с командой в выводе /tab. По умолчанию отключено для более «ванильного» списка игроков.


[AppVar]
# может использоваться в некоторых других полях как %yourvar%
# %username%, %login%, %serverip%, %serverport%, %datetime% и %players% — зарезервированные только для чтения переменные.
[AppVar.VarStirng]
your_var = "your_value"
"your var 2" = "your value 2"


# Подключиться к серверу используя прокси вместо прямого подключения
# Если серверы Mojang заблокированы в Вашей сети, пропишите "Enable_Login=true", чтобы подключиться с помощью прокси
# Если подключение к серверу блокируется брандмауэром, пропишите "Enable_Ingame=true", чтобы использовать прокси при подключении к серверу
# /!\ Убедитесь, что в правлиах сервера разрешено использование прокси и VPN, перед тем, как включать их.
[Proxy]
Enabled_Update = false                      # Следует ли скачивать обновления MCC через прокси?
Enabled_Login = false                       # Следует ли подключаться к серверу через прокси?
Enabled_Ingame = false                      # Следует ли подключаться к серверу через прокси?
Server = { Host = "0.0.0.0", Port = 8080 }  # Прокси сервер должен поддерживать вход по HTTPS и быть не на 443 порту
Proxy_Type = "HTTP"                         # Доступные типы: "HTTP", "SOCKS4", "SOCKS4a", "SOCKS5".
Username = ""                               # Требуется только для прокси, защищенных паролем
Password = ""                               # Требуется только для прокси, защищенных паролем

# Настройки ниже отправляются на сервер и влияют только на серверные вещи, такие как ваш скин.
[MCSettings]
Enabled = true                              # Если отключено, настройки ниже не отправляются на сервер.
Locale = "en_US"                            # Используйте любой язык, реализованный в Minecraft.
RenderDistance = 8                          # Значение: [0 - 255].
Difficulty = "peaceful"                     # MC 1.7- сложность. Мирный - "peaceful", легкий - "easy", нормальный - "normal", сложный - "difficult"
ChatMode = "enabled"                        # Используйте "enabled", "commands" или "disabled". Позволяет замутить себя
ChatColors = true                           # Позволяет отключать цвета чата на стороне сервера.
MainHand = "left"                           # MC 1.9+ основная рука. Левая (left) или правая (right)
[MCSettings.Skin]
Cape = true
Hat = true
Jacket = false
Sleeve_Left = false
Sleeve_Right = false
Pants_Left = false
Pants_Right = false


# MCC хорошо обнаруживает сообщения в чате, но у некоторых серверов есть необычные форматы чата.
# Когда это происходит, вам нужно настроить формат чата ниже, смотрите https://mccteam.github.io/g/conf/#chat-format-section
[ChatFormat]
Builtins = true                             # Поддержка MCC для общих форматов сообщений. Установите "false", чтобы избежать конфликтов с пользовательскими форматами.
UserDefined = false                         # Использовать ли настраиваемые регулярные выражения ниже для обнаружения.
Public = "^<([a-zA-Z0-9_]+)> (.+)$"
Private = "^([a-zA-Z0-9_]+) whispers to you: (.+)$"
TeleportRequest = '^([a-zA-Z0-9_]+) has requested (?:to|that you) teleport to (?:you|them)\.$'

# ================================= #
#  Minecraft Console Client Боты #
# =========================================== #
[ChatBot]
# Получайте оповещение об обнаружении указанных слов в чате
# Полезно для модерирования вашего сервера или обнаружения когда кто-то обращается к вам
[ChatBot.Alerts]
Enabled = false
Beep_Enabled = true                         # Воспроизвести звук "beep" при обнаружении слова в дополнение к выделению.
Trigger_By_Words = false                    # Запускает оповещение после получения указанного ключевого слова.
Trigger_By_Rain = false                     # Уведомление, когда дождь начинается и когда останавливается.
Trigger_By_Thunderstorm = false             # Уведомление о начале и конце грозы.
Log_To_File = false                         # Записывать информацию об оповещениях в файл.
Log_File = "alerts-log.txt"                 # Имя файла, в котором будет записан журнал оповещений.
# Список слов/строк, которые оповещают вас.
Matches = [ "Yourname", " whispers ", "-> me", "admin", ".com", ]
# Список слов/строк, которые НЕ оповещают вас.
Excludes = [ "myserver.com", "Yourname>:", "Player Yourname", "Yourname joined", "Yourname left", "[Lockette] (Admin)", " Yourname:", "Yourname is", ]

# Отправьте команду на регулярной или случайной основе или заставьте бота случайным образом ходить около, чтобы избежать автоматического разъединения из-за AFK
# /! Убедитесь, что ваши правила сервера не запрещают анти-AFK механизмы!
# /!\ Убедитесь, что вы держите бота в закрытом пространстве, чтобы избежать его блуждания если вы используете "terrain handling"! (Рекомендуемый размер 5x5x5)
[ChatBot.AntiAFK]
Enabled = false
Delay = { min = 60.0, max = 60.0 }          # Период выполнения. (в секундах)
Command = "/ping"                           # Команда для отправки на сервер.
Use_Sneak = false                           # Красться при отправке команды.
Use_Terrain_Handling = false                # Использовать "terrain handling" чтобы бот перемещался около места старта.
Walk_Range = 5                              # Размер, в котором бот может двигаться случайным образом (Примечание: чем больше расстояние, тем медленнее бот будет)
Walk_Retries = 20                           # Количество неудачных попыток перед тем как бот начнет использовать командный метод.

# Автоматически атаковать враждебных существ около вас.
# Вам нужно включить "Entity Handling" чтобы использовать этого бота.
# /!\ Убедитесь что правила сервера позволяют вам пользоваться авто атакой
# /!\ ПЛАГИНЫ СЕРВЕРА могут рассмотреть авто атаку как ЧИТ МОД и ПРИНЯТЬ МЕРЫ ПРОТИВ ВАШЕГО АККАУНТА так что ДВАДЖЫ ПРОВЕРЬТЕ ПРАВИЛА СЕРВЕРА
[ChatBot.AutoAttack]
Enabled = true
Mode = "single"                             # «одиночный» или «мульти». одиночная цель по одному мобу за атаку. Уничтожайте всех мобов в радиусе действия за атаку
Priority = "distance"                       # "здоровье" или "расстояние". Требуется только при использовании единого режима
Interaction = "Attack"                      # Возможные значения: "Interact"(взаимодействовать), "Attack" ((Атаковать)по умолчанию), "InteractAt" (Взаимодействие и атака).
Attack_Range = 4.0                          # Диапазон от 1 до 4
Attack_Hostile = true                       # Разрешить атаковать враждебных существ.
Attack_Passive = true                       # Разрешить атаковать пассивных существ.
List_Mode = "blacklist"                     # Ведь мы рассматриваем список сущностей как «белый» или «черный список».
Entites_List = [ "Player", ]                # Все типы существ можно найти тут: https://mccteam.github.io/r/entity/#L15
[ChatBot.AutoAttack.Cooldown_Time]          # Delay between attacks. Set "Custom = false" to let MCC calculate it. When Custom = true, set Min/Max for the cooldown range. If RandomMode = true, a random value between Min and Max is used for each attack.
Custom = false
RandomMode = false
Min = 1.5
Max = 2.5


